name: Deploy to GitHub Pages

on:
  # Run on push to main branch
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if secrets are configured
        run: |
          echo "Checking GitHub Secrets configuration..."

          if [ -z "${{ secrets.ONEMAP_EMAIL }}" ]; then
            echo "❌ ONEMAP_EMAIL secret is NOT set"
            echo "::warning::ONEMAP_EMAIL secret is missing. Token auto-fetch will not work."
            EMAIL_SET=false
          else
            echo "✅ ONEMAP_EMAIL secret is set"
            EMAIL_SET=true
          fi

          if [ -z "${{ secrets.ONEMAP_PASSWORD }}" ]; then
            echo "❌ ONEMAP_PASSWORD secret is NOT set"
            echo "::warning::ONEMAP_PASSWORD secret is missing. Token auto-fetch will not work."
            PASSWORD_SET=false
          else
            echo "✅ ONEMAP_PASSWORD secret is set"
            PASSWORD_SET=true
          fi

          if [ -z "${{ secrets.GOOGLE_SHEETS_URL }}" ]; then
            echo "ℹ️  GOOGLE_SHEETS_URL secret is NOT set (optional)"
            echo "::notice::GOOGLE_SHEETS_URL secret is missing. Save to Sheets feature will be disabled."
          else
            echo "✅ GOOGLE_SHEETS_URL secret is set"
          fi

          if [ "$EMAIL_SET" = true ] && [ "$PASSWORD_SET" = true ]; then
            echo ""
            echo "🎉 All required secrets configured! Auto-token fetch will be enabled."
          else
            echo ""
            echo "⚠️  Some secrets are missing. The app will still work but users will need to manually enter their API token."
          fi

      - name: Generate secrets.js from GitHub Secrets
        run: |
          # Check if secrets are actually set (not empty)
          ONEMAP_EMAIL="${{ secrets.ONEMAP_EMAIL }}"
          ONEMAP_PASSWORD="${{ secrets.ONEMAP_PASSWORD }}"
          GOOGLE_SHEETS_URL="${{ secrets.GOOGLE_SHEETS_URL }}"

          echo "Generating secrets.js..."
          echo "  ONEMAP_EMAIL length: ${#ONEMAP_EMAIL}"
          echo "  ONEMAP_PASSWORD length: ${#ONEMAP_PASSWORD}"
          echo "  GOOGLE_SHEETS_URL length: ${#GOOGLE_SHEETS_URL}"

          cat > docs/js/secrets.js << 'SECRETSEOF'
          /**
           * Auto-generated secrets file
           * Generated by GitHub Actions during deployment
           */
          export const SECRETS = {
            onemap: {
              email: "ONEMAP_EMAIL_PLACEHOLDER",
              password: "ONEMAP_PASSWORD_PLACEHOLDER"
            },
            googleSheets: {
              webAppUrl: "GOOGLE_SHEETS_URL_PLACEHOLDER"
            }
          };
          SECRETSEOF

          # Replace placeholders with actual values
          sed -i "s|ONEMAP_EMAIL_PLACEHOLDER|${ONEMAP_EMAIL}|g" docs/js/secrets.js
          sed -i "s|ONEMAP_PASSWORD_PLACEHOLDER|${ONEMAP_PASSWORD}|g" docs/js/secrets.js
          sed -i "s|GOOGLE_SHEETS_URL_PLACEHOLDER|${GOOGLE_SHEETS_URL}|g" docs/js/secrets.js

          echo "✅ secrets.js generated successfully"
          echo "Verifying file was created:"
          ls -la docs/js/secrets.js
          echo "File contents (redacted):"
          head -10 docs/js/secrets.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
